services:
  - type: web
    name: makepdfs-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: MAX_FILE_MB
        value: 50
      - key: CONVERT_TIMEOUT_MS
        value: 120000
      - key: SHARE_FILE_TTL_MS
        value: 86400000
      - key: SHARE_CLEANUP_INTERVAL_MS
        value: 60000
      - key: SERVE_STATIC_SITE
        value: 0
      - key: SHARE_STORAGE_BACKEND
        value: local
      - key: CORS_ORIGIN
        sync: false
      - key: SHARE_PUBLIC_BASE_URL
        sync: false
      - key: SHARE_DASHBOARD_TOKEN
        sync: false
      - key: SHARE_GCS_BUCKET
        sync: false
      - key: SHARE_GCS_PREFIX
        value: share
